<!DOCTYPE html>
<html>
<head>
  <title>News Tracker</title>
</head>
<body>

<h2>Live News</h2>

<div id="feedItems">Loading...</div>

<script>
async function loadNews() {
  try {
    const res = await fetch('data.json?_t=' + Date.now());
    const data = await res.json();

    const container = document.getElementById('feedItems');

    container.innerHTML = data.map(item => `
      <div style="padding:10px;border-bottom:1px solid #ccc;">
        <a href="${item.link}" target="_blank">${item.title}</a>
      </div>
    `).join('');

  } catch (e) {
    document.getElementById('feedItems').innerHTML = "Error loading news";
  }
}

loadNews();
</script>

</body>
</html>

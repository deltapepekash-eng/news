name: Update JSON Data


on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:         # manual trigger

concurrency:
  group: update-json
  cancel-in-progress: true

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # No cache: "pip" — requires requirements.txt which doesn't exist in this repo.
          # Without it the step errors: "No file matched [**/requirements.txt]"

      - name: Install dependencies
        # bse + nsepython were missing in original — caused silent ImportError,
        # leaving only 30-54 Google News items after dedup.
        run: pip install --upgrade requests feedparser bse nsepython

      - name: Run fetch script
        run: python scripts/fetch_bse_nse.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: auto-update BSE/NSE data [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"
          git push

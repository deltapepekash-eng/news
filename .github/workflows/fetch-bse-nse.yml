name: Fetch BSE/NSE Data



on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install bse nsepython requests

      - name: Fetch BSE & NSE data
        run: python scripts/fetch_bse_nse.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bse_nse.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "data: refresh BSE/NSE $(date -u +'%H:%M UTC') [skip ci]" && git push

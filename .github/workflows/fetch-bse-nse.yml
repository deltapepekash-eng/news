name: Fetch BSE/NSE Data

on:
  schedule:
    # Market hours IST 09:15–16:30 = UTC 03:45–11:00, Mon–Fri
    - cron: '*/15 3-11 * * 1-5'    # every 15 min during market hours
    - cron: '0 * * * 1-5'          # hourly off-hours weekdays
    - cron: '0 */2 * * 0,6'        # every 2h on weekends
  workflow_dispatch:                # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install bse nsepython requests

      - name: Fetch BSE & NSE data
        run: python scripts/fetch_bse_nse.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bse_nse.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "data: refresh BSE/NSE $(date -u +'%H:%M UTC') [skip ci]" && git push
